<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today — Todo List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Work+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="ledger">
    <header class="ledger-header">
      <h1>Today</h1>
      <span class="count" id="count">0 left</span>
    </header>

    <form id="todo-form" class="entry-row">
      <input
        type="text"
        id="todo-input"
        placeholder="Add a task…"
        autocomplete="off"
        maxlength="120"
      />
      <button type="submit">Add</button>
    </form>

    <ul id="todo-list" class="ledger-list"></ul>

    <p id="empty-state" class="empty-state">
      Nothing on the list yet — add your first task above.
    </p>
  </main>

  <script src="todoLogic.js"></script>
  <script src="script.js"></script>
</body>
</html>
